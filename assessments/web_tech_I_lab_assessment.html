<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment: Web Technology I</title>
    <link rel="stylesheet" href="../css/assessment.css">
    <style>
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            position: relative;
        }

        h1, h2, h3 {
            color: var(--dark);
            margin-bottom: 20px;
        }

        /* Top Bar Status */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #6b7280;
        }

        /* Canvas Task Styles */
        .task-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #fafafa;
        }

        .task-header {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .quiz-option {
            display: block;
            background: var(--white);
            border: 2px solid var(--border);
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-option:hover {
            border-color: #cbd5e1;
            background: var(--light);
        }

        .quiz-option.selected {
            border-color: var(--primary);
            background-color: #eef2ff;
        }

        /* Editor Block */
        .code-container {
            margin-top: 15px;
        }

        textarea.code-editor {
            width: 100%;
            height: 120px;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            background: #1e293b;
            color: #f8fafc;
            border-radius: 6px;
            border: none;
            resize: vertical;
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn-nav {
            width: auto;
            min-width: 120px;
        }

        .btn-secondary {
            background-color: #6b7280;
        }
        .btn-secondary:hover {
            background-color: #4b5563;
        }

        /* Final Screen */
        .completion-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .success-icon {
            font-size: 64px;
            color: var(--secondary);
            margin-bottom: 20px;
        }

        .verification-text {
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .verified { color: var(--success); }
        .unverified { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">

    <div class="celebration-overlay" id="auth-screen">
        <div class="celebration-card">
            <h2>📋 Assessment Entry</h2>
            <p style="color: #334155; margin-bottom: 1.5rem;">Web Technology I · Grade XI</p>
            <input type="text" id="student-name" placeholder="Full Name" required>
            <input type="text" id="student-roll" placeholder="Roll Number" required>
            <input type="text" id="student-room" placeholder="Room Number" required>
            <div id="entryError" class="error-msg" style="display:none;">All fields required.</div>
            <button class="btn-primary" id="enterBtn">Start Assessment</button>
            <p style="font-size: 0.75rem; color: #64748b; margin-top: 1rem;">10 interactive tasks · timing tracked</p>
        </div>
    </div>

    <div id="lab-workspace" class="hidden">
        <div class="status-bar">
            <div><strong>Student:</strong> <span id="display-student-name"></span> (Roll <span id="display-student-roll"></span> / Room <span id="display-student-room"></span>)</div>
            <div><strong>Task:</strong> <span id="current-task-num">1</span> of <span id="total-tasks-num">10</span></div>
        </div>
        <div class="progress-container">
            <div id="lab-progress" class="progress-bar"></div>
        </div>

        <div style="margin-top: 25px;">
            <div id="task-container">
                </div>
        </div>

        <div class="action-buttons">
            <button type="button" class="btn btn-nav btn-secondary hidden" id="prev-btn" onclick="navigateTask(-1)">Previous</button>
            <button type="button" class="btn btn-nav" id="next-btn" onclick="navigateTask(1)">Next Task</button>
        </div>
    </div>

    <div id="completion-screen" class="hidden celebration-overlay">
        <div class="celebration-card">
            <h2 style="color: var(--success);">🎉 Assessment Complete</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;" id="report-title"></p>
            <div style="background: #f8fafc; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: left; border:1px solid var(--border);">
                <p><strong>Student:</strong> <span id="report-name" style="color:var(--primary-light);"></span></p>
                <p><strong>Roll:</strong> <span id="report-roll" style="color:var(--primary-light);"></span>  <strong>Room:</strong> <span id="report-room" style="color:var(--primary-light);"></span></p>
                <p><strong>Score:</strong> <span id="report-score" style="color:var(--accent); font-weight:bold;"></span></p>
            </div>
            <p style="font-size:0.85rem; color:#64748b; margin-bottom: 10px;" id="report-timing"></p>
            <p style="font-size:0.85rem; color:#64748b; margin-top: 20px;">You may close this page.</p>
        </div>
    </div>

</div>


<script>
    const SUBMISSION_CONFIG = {
        url: "https://docs.google.com/forms/d/e/1FAIpQLSfGf84mAWH8lnGsDDXufaIsJhfzJ0YQ9jySZj9h5uarnr9uNg/formResponse",
        fields: {
            topic: "entry.1920009954",
            name: "entry.2015805623",
            roll: "entry.419024899",
            room: "entry.2086415032",
            status: "entry.1234471729",
            startTime: "entry.597147393",
            endTime: "entry.1045529602",
            elapsedTime: "entry.2019742758"
        }
    };

    const labTasks = [
        {
            id: 1,
            title: "HTML Basic Structure",
            instruction: "Which tag order is correct for a basic HTML document?",
            type: "quiz",
            options: [
                "&lt;html&gt; then &lt;body&gt;",
                "&lt;body&gt; wrapping &lt;html&gt;",
                "&lt;head&gt; before &lt;html&gt;",
                "No structural declarations"
            ],
            correctIndex: 0
        },
        {
            id: 2,
            title: "Images with Dimensions",
            instruction: "Write an &lt;img&gt; tag that references an external image and sets height &amp; width.",
            type: "code",
            placeholder: '<img ',
            validationKeyword: "src="
        },
        {
            id: 3,
            title: "Formatting Elements",
            instruction: "Which combination correctly provides a line break, a horizontal rule, and emphasis?",
            type: "quiz",
            options: [
                "&lt;lb&gt;, &lt;line&gt;, &lt;bold&gt;",
                "&lt;br&gt;, &lt;hr&gt;, &lt;strong&gt;, &lt;em&gt;",
                "&lt;break&gt;, &lt;rule&gt;, &lt;i&gt;",
                "&lt;div&gt;, &lt;span&gt;, &lt;p&gt;"
            ],
            correctIndex: 1
        },
        {
            id: 4,
            title: "Table Spanning",
            instruction: "Which attributes let table cells span multiple rows or columns?",
            type: "quiz",
            options: [
                "rowspan and colspan",
                "colextend and rowextend",
                "CSS grid spanning",
                "&lt;table&gt; span parameters"
            ],
            correctIndex: 0
        },
        {
            id: 5,
            title: "Login Form",
            instruction: "Write a &lt;form&gt; with username input. Use POST method and action='/login'.",
            type: "code",
            placeholder: '<form action="/login" method="POST">\n  <label>Username:</label>\n  <input type="text" name="user">\n</form>',
            validationKeyword: "form"
        },
        {
            id: 6,
            title: "HTML5 Audio",
            instruction: "Which element architecture plays audio natively in modern browsers?",
            type: "quiz",
            options: [
                "&lt;embed src='sound.mp3'&gt;",
                "&lt;object data='sound.mp3'&gt;",
                "&lt;audio controls&gt; with &lt;source&gt;",
                "&lt;media type='audio'&gt;"
            ],
            correctIndex: 2
        },
        {
            id: 7,
            title: "SVG Circle",
            instruction: "Write an SVG with a circle (cx=50, cy=50, r=40, fill='indigo').",
            type: "code",
            placeholder: '<svg width="100" height="100">\n  <circle cx="50" cy="50" r="40" fill="indigo" />\n</svg>',
            validationKeyword: "circle"
        },
        {
            id: 8,
            title: "CSS Priority",
            instruction: "Which style declaration has the highest priority?",
            type: "quiz",
            options: [
                "External stylesheet",
                "Internal &lt;style&gt; block",
                "Inline style attribute",
                "Browser defaults"
            ],
            correctIndex: 2
        },
        {
            id: 9,
            title: "CSS Box Model",
            instruction: "What are the four layers of the CSS Box Model?",
            type: "quiz",
            options: [
                "Margin, Border, Padding, Content",
                "Top, Bottom, Left, Right",
                "Width, Height, Background, Color",
                "Flexbox grid coordinates"
            ],
            correctIndex: 0
        },
        {
            id: 10,
            title: "External CSS Link",
            instruction: "Write a &lt;link&gt; tag to load an external stylesheet 'styles.css'.",
            type: "code",
            placeholder: '<link rel="stylesheet" href="styles.css">',
            validationKeyword: "href="
        }
    ];

    let currentTaskIndex = 0;
    let studentData = { name: "", roll: "", room: "" };
    let sessionTiming = { startTime: null, endTime: null };
    let responses = {};
    let verified = {};

    function formatClockTime(date) {
        return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
    }

    function formatElapsed(ms) {
        const totalSeconds = Math.max(0, Math.round(ms / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;
    }

    document.getElementById('enterBtn').addEventListener('click', function() {
        const name = document.getElementById('student-name').value.trim();
        const roll = document.getElementById('student-roll').value.trim();
        const room = document.getElementById('student-room').value.trim();

        if (!name || !roll || !room) {
            document.getElementById('entryError').style.display = 'block';
            return;
        }
        document.getElementById('entryError').style.display = 'none';

        studentData.name = name;
        studentData.roll = roll;
        studentData.room = room;
        sessionTiming.startTime = new Date();

        document.getElementById('display-student-name').innerText = studentData.name;
        document.getElementById('display-student-roll').innerText = studentData.roll;
        document.getElementById('display-student-room').innerText = studentData.room;

        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('lab-workspace').classList.remove('hidden');
        document.getElementById('total-tasks-num').innerText = labTasks.length;
        renderTask();
    });

    function renderTask() {
        const task = labTasks[currentTaskIndex];
        const container = document.getElementById('task-container');
        container.innerHTML = '';

        document.getElementById('current-task-num').innerText = currentTaskIndex + 1;
        const progressPercent = ((currentTaskIndex) / labTasks.length) * 100;
        document.getElementById('lab-progress').style.width = `${progressPercent}%`;

        document.getElementById('prev-btn').classList.toggle('hidden', currentTaskIndex === 0);

        if (currentTaskIndex === labTasks.length - 1) {
            document.getElementById('next-btn').innerText = 'Submit All & Finish';
            document.getElementById('next-btn').style.backgroundColor = 'var(--secondary)';
        } else {
            document.getElementById('next-btn').innerText = 'Next Task';
            document.getElementById('next-btn').style.backgroundColor = 'var(--primary)';
        }

        const card = document.createElement('div');
        card.className = 'task-card';

        const header = document.createElement('div');
        header.className = 'task-header';
        header.innerText = `Task ${task.id}: ${task.title}`;
        card.appendChild(header);

        const instruction = document.createElement('p');
        instruction.style.marginBottom = '15px';
        instruction.innerText = task.instruction;
        card.appendChild(instruction);

        const statusEl = document.createElement('div');
        statusEl.id = `status-${currentTaskIndex}`;
        statusEl.className = 'verification-text unverified';
        if (verified[currentTaskIndex] === true) {
            statusEl.innerText = '✅ Correct';
            statusEl.className = 'verification-text verified';
        } else if (verified[currentTaskIndex] === false) {
            statusEl.innerText = '❌ Incorrect';
            statusEl.className = 'verification-text unverified';
        } else {
            statusEl.innerText = '❌ Not attempted';
        }
        card.appendChild(statusEl);

        if (task.type === 'quiz') {
            task.options.forEach((opt, idx) => {
                const optEl = document.createElement('div');
                optEl.className = 'quiz-option' + (responses[currentTaskIndex] === idx ? ' selected' : '');
                optEl.innerHTML = opt;
                optEl.onclick = () => selectQuizOption(idx);
                card.appendChild(optEl);
            });
        } else if (task.type === 'code') {
            const codeContainer = document.createElement('div');
            codeContainer.className = 'code-container';
            const textarea = document.createElement('textarea');
            textarea.className = 'code-editor';
            textarea.placeholder = 'Write your HTML here...';
            textarea.value = responses[currentTaskIndex] !== undefined ? responses[currentTaskIndex] : task.placeholder;
            textarea.oninput = (e) => {
                responses[currentTaskIndex] = e.target.value;
                checkCodeTask(currentTaskIndex);
            };
            codeContainer.appendChild(textarea);
            card.appendChild(codeContainer);
        }

        container.appendChild(card);
    }

    function selectQuizOption(idx) {
        responses[currentTaskIndex] = idx;
        const task = labTasks[currentTaskIndex];
        const isCorrect = (idx === task.correctIndex);
        verified[currentTaskIndex] = isCorrect;

        const statusEl = document.getElementById(`status-${currentTaskIndex}`);
        if (isCorrect) {
            statusEl.innerText = '✅ Correct';
            statusEl.className = 'verification-text verified';
        } else {
            statusEl.innerText = '❌ Incorrect';
            statusEl.className = 'verification-text unverified';
        }

        const options = document.querySelectorAll('.quiz-option');
        options.forEach((el, i) => {
            el.classList.toggle('selected', i === idx);
        });
    }

    function checkCodeTask(index) {
        const task = labTasks[index];
        const answer = responses[index] || '';
        const isCorrect = answer.toLowerCase().includes(task.validationKeyword.toLowerCase());
        verified[index] = isCorrect;

        const statusEl = document.getElementById(`status-${index}`);
        if (isCorrect) {
            statusEl.innerText = '✅ Correct';
            statusEl.className = 'verification-text verified';
        } else {
            statusEl.innerText = '❌ Incorrect';
            statusEl.className = 'verification-text unverified';
        }
    }

    function navigateTask(direction) {
        if (responses[currentTaskIndex] === undefined && labTasks[currentTaskIndex].type === 'code') {
            responses[currentTaskIndex] = labTasks[currentTaskIndex].placeholder;
        }

        currentTaskIndex += direction;

        if (currentTaskIndex >= 0 && currentTaskIndex < labTasks.length) {
            renderTask();
        } else if (currentTaskIndex >= labTasks.length) {
            processSubmission();
        }
    }

    function processSubmission() {
        let earnedScore = 0;
        labTasks.forEach((task, idx) => {
            if (verified[idx] === true) earnedScore++;
        });

        const scoreString = `${earnedScore}/${labTasks.length}`;
        const topicTitle = 'Web Technology I';

        sessionTiming.endTime = new Date();
        const elapsedMs = sessionTiming.endTime - sessionTiming.startTime;
        const startTimeString = formatClockTime(sessionTiming.startTime);
        const endTimeString = formatClockTime(sessionTiming.endTime);
        const elapsedString = formatElapsed(elapsedMs);

        const formData = new FormData();
        formData.append(SUBMISSION_CONFIG.fields.topic, topicTitle);
        formData.append(SUBMISSION_CONFIG.fields.name, studentData.name);
        formData.append(SUBMISSION_CONFIG.fields.roll, studentData.roll);
        formData.append(SUBMISSION_CONFIG.fields.room, `XI - ${studentData.room}`);
        formData.append(SUBMISSION_CONFIG.fields.status, scoreString);
        formData.append(SUBMISSION_CONFIG.fields.startTime, startTimeString);
        formData.append(SUBMISSION_CONFIG.fields.endTime, endTimeString);
        formData.append(SUBMISSION_CONFIG.fields.elapsedTime, elapsedString);

        fetch(SUBMISSION_CONFIG.url, { method: 'POST', mode: 'no-cors', body: formData }).catch(() => {});

        document.getElementById('lab-progress').style.width = '100%';
        document.getElementById('lab-workspace').classList.add('hidden');
        document.getElementById('report-title').innerText = topicTitle;
        document.getElementById('report-name').innerText = studentData.name;
        document.getElementById('report-roll').innerText = studentData.roll;
        document.getElementById('report-room').innerText = studentData.room;
        document.getElementById('report-score').innerText = scoreString;
        document.getElementById('report-timing').innerText = `⏱ Started: ${startTimeString} · Finished: ${endTimeString} · Time Taken: ${elapsedString}`;
        document.getElementById('completion-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
